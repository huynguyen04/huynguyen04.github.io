<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Huy Nguyen's Portfolio - Experience</title>
    <style>
        /* General Styles */
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            padding: 20px;
            background: #fff;
        }
        .timeline-container {
            max-width: 900px;
            padding: auto;
            margin-left: 20px;
        }
        .timeline-block {
            background: #f4f4f4;
            border-radius: 4px;
            margin-bottom: 10px;
            padding: 20px;
            position: relative;
        }
        .milestone {
            font-size: 18px;
            color: #333;
            font-weight: bold;
        }
        .details {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255,255,255,0.9);
            padding: 20px;
            box-sizing: border-box;
            border-radius: 4px;
            font-size: 15px;
        }
        .close {
            display: none;
        }
        /* Checkbox Hack */
        .detail-toggle {
            display: none;
        }
        .detail-toggle:checked + label > .details {
            display: block;
        }
        .detail-toggle:checked + label > .close {
            display: block;
            position: absolute;
            top: 10px;
            right: 20px;
            cursor: pointer;
            font-size: 20px;
            background-color: #f4f4f4;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            line-height: 30px;
            text-align: center;
        }
    </style>
</head>
<body>

<section class="timeline-container">
    <h2>💼 Experience</h2>
    <div class="timeline-block">
        <input type="checkbox" id="toggle-detail-1" class="detail-toggle">
        <label for="toggle-detail-1">
            <div class="milestone">Undergraduate Research Assistant, Insight Computer Architecture Lab</div>
            <div class="details">
                Exploring GPU computing and deep learning optimization through hands-on research and collaboration with graduate students.
                <button class="close" onclick="document.getElementById('toggle-detail-1').checked = false;">&times;</button>
            </div>
        </label>
    </div>
    <!-- Add more timeline blocks as needed -->
</section>

</body>
</html>

</body>
